              - strong [ref=e1183]: Hugo 0.156+ 弃用
              - text: ：
              - code [ref=e1184]: site.Data
              - text: 替换为
              - code [ref=e1185]: hugo.Data
              - text: ，避免构建警告
            - listitem [ref=e1186]:
              - strong [ref=e1187]: APlayer API
              - text: ：
              - code [ref=e1188]: ap.audio
              - text: 是 HTML5 Audio 元素（有 currentTime/paused/volume），歌曲元数据在
              - code [ref=e1189]: ap.list.audios[index]
              - text: （有 name/artist/cover/lrc）
            - listitem [ref=e1190]:
              - strong [ref=e1191]: CSS 层叠上下文
              - text: ：
              - code [ref=e1192]: "z-index: -1"
              - text: 的 fixed 元素在 body 背景下方，需要 body 半透明才能看见
            - listitem [ref=e1193]:
              - strong [ref=e1194]: Chrome autofill
              - text: ：用
              - code [ref=e1195]: "-webkit-box-shadow: inset"
              - text: 替代
              - code [ref=e1196]: background
              - text: 设置输入框背景色
            - listitem [ref=e1197]:
              - strong [ref=e1198]: 所有功能集中在两个文件
              - text: ——便于维护，但修改时要小心不要破坏其他功能
